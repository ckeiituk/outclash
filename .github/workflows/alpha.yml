name: Alpha Build

on:
  workflow_dispatch:
permissions: write-all
env:
  TAG_NAME: alpha
  TAG_CHANNEL: Alpha
  MACOS_SIGNING_READY: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_CONTENT != '' }}
concurrency:
  group: "${{ github.workflow }} - ${{ github.head_ref || github.ref }}"

jobs:
  check_alpha_tag:
    name: Check Alpha Tag package.json Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check tag and package.json version
        id: check_tag
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Current tag: $TAG_REF"
          if [[ ! "$TAG_REF" =~ -alpha ]]; then
            echo "Current tag is not an alpha tag."
            exit 1
          fi
          PKG_VERSION=$(jq -r .version package.json)
          echo "package.json version: $PKG_VERSION"
          if [[ "$PKG_VERSION" != *alpha* ]]; then
            echo "package.json version is not an alpha version."
            exit 1
          fi
          if [[ "$TAG_REF" != "v$PKG_VERSION" ]]; then
            echo "Tag ($TAG_REF) does not match package.json version (v$PKG_VERSION)."
            exit 1
          fi
          echo "Alpha tag and package.json version are consistent."

  delete_old_assets:
    name: Delete Old Alpha Release Assets and Tags
    needs: check_alpha_tag
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old Alpha Tags Except Latest
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagPattern = /-alpha.*/;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              const { data: tags } = await github.rest.repos.listTags({
                owner,
                repo,
                per_page: 100
              });

              const alphaTags = (await Promise.all(
                tags
                  .filter(tag => tagPattern.test(tag.name))
                  .map(async tag => {
                    const { data: commit } = await github.rest.repos.getCommit({
                      owner,
                      repo,
                      ref: tag.commit.sha
                    });
                    return {
                      ...tag,
                      commitDate: commit.committer && commit.committer.date ? commit.committer.date : commit.commit.author.date
                    };
                  })
              )).sort((a, b) => {
                return new Date(b.commitDate) - new Date(a.commitDate);
              });

              console.log(`Found ${alphaTags.length} alpha tags`);

              if (alphaTags.length === 0) {
                console.log('No alpha tags found');
                return;
              }

              const latestTag = alphaTags[0];
              console.log(`Keeping latest alpha tag: ${latestTag.name}`);

              for (const tag of alphaTags.slice(1)) {
                console.log(`Processing tag: ${tag.name}`);

                try {
                  const { data: release } = await github.rest.repos.getReleaseByTag({
                    owner,
                    repo,
                    tag: tag.name
                  });

                  if (release.assets && release.assets.length > 0) {
                    console.log(`Deleting ${release.assets.length} assets for release ${tag.name}`);
                    for (const asset of release.assets) {
                      console.log(`Deleting asset: ${asset.name} (${asset.id})`);
                      await github.rest.repos.deleteReleaseAsset({
                        owner,
                        repo,
                        asset_id: asset.id
                      });
                    }
                  }

                  console.log(`Deleting release for tag: ${tag.name}`);
                  await github.rest.repos.deleteRelease({
                    owner,
                    repo,
                    release_id: release.id
                  });

                  console.log(`Deleting tag: ${tag.name}`);
                  await github.rest.git.deleteRef({
                    owner,
                    repo,
                    ref: `tags/${tag.name}`
                  });

                } catch (error) {
                  if (error.status === 404) {
                    console.log(`No release found for tag ${tag.name}, deleting tag directly`);
                    await github.rest.git.deleteRef({
                      owner,
                      repo,
                      ref: `tags/${tag.name}`
                    });
                  } else {
                    console.error(`Error processing tag ${tag.name}:`, error);
                    throw error;
                  }
                }
              }

              console.log('Old alpha tags and releases deleted successfully');
            } catch (error) {
              console.error('Error:', error);
              throw error;
            }

  update_tag:
    name: Update tag
    runs-on: ubuntu-latest
    needs: delete_old_assets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch UPDATE logs
        id: fetch_update_logs
        run: |
          if [ -f "UPDATELOG.md" ]; then
            UPDATE_LOGS=$(awk '/^## v/{if(flag) exit; flag=1} flag' UPDATELOG.md)
            if [ -n "$UPDATE_LOGS" ]; then
              echo "Found update logs"
              echo "UPDATE_LOGS<<EOF" >> $GITHUB_ENV
              echo "$UPDATE_LOGS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            else
              echo "No update sections found in UPDATELOG.md"
            fi
          else
            echo "UPDATELOG.md file not found"
          fi
        shell: bash

      - name: Set Env
        run: |
          echo "BUILDTIME=$(TZ=Asia/Shanghai date)" >> $GITHUB_ENV
        shell: bash

      - run: |
          if [ -z "$UPDATE_LOGS" ]; then
            echo "No update logs found, using default message"
            UPDATE_LOGS="More new features are now supported. Check for detailed changelog soon."
          else
            echo "Using found update logs"
          fi

          cat > release.txt << EOF
          $UPDATE_LOGS

          ## Which version should I download?

          ### MacOS
          - MacOS Intel Chip: x64.pkg
          - MacOS Apple M Chip: arm64.pkg

          ### Linux
          - Linux 64-bit: amd64.deb/x86_64.rpm
          - Linux arm64: arm64.deb/aarch64.rpm

          ### Windows
          #### Normal version (recommended)
          - 64-bit: x64-setup.exe
          - arm64: arm64-setup.exe
          #### Portable version
          - 64-bit: x64-portable.7z
          - arm64: arm64-portable.7z

          Created at ${{ env.BUILDTIME }}.
          EOF

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OutClash ${{ env.TAG_CHANNEL }}"
          body_path: release.txt
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

  alpha-build:
    name: Alpha Build
    needs: update_tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: arm64
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies and prepare
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
        shell: bash
        run: |
          SKIP_PREPARE=1 pnpm install
          pnpm prepare --${{ matrix.arch }}

      - name: Install Build Tools (Linux pacman)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y libarchive-tools fakeroot

      - name: Skip macOS build (signing secrets missing)
        if: matrix.os == 'macos-latest' && env.MACOS_SIGNING_READY != 'true'
        run: |
          echo "Skipping macOS build: signing secrets missing."
          exit 0

      - name: Create Apple API Key file
        if: matrix.os == 'macos-latest' && env.MACOS_SIGNING_READY == 'true'
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      - name: Build
        if: matrix.os != 'macos-latest' || env.MACOS_SIGNING_READY == 'true'
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WINDOWS_CERTIFICATE || (matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE || '') }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WINDOWS_CERT_PASSWORD || (matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '') }}
          CSC_NAME: ${{ matrix.os == 'macos-latest' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}
          APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && format('~/.appstoreconnect/private_keys/AuthKey_{0}.p8', secrets.APPLE_API_KEY) || '' }}
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            pnpm build:win --${{ matrix.arch }}
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            pnpm build:linux --${{ matrix.arch }}
          else
            pnpm build:mac --${{ matrix.arch }}
          fi

      - name: Add Portable Flag
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -Path "PORTABLE" -ItemType File
          Get-ChildItem dist/*portable.7z | ForEach-Object {
            7z a $_.FullName PORTABLE
          }

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "OutClash ${{ env.TAG_CHANNEL }}"
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/OutClash*
