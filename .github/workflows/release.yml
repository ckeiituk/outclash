name: Release Build

on:
  # 仅通过符合语义化的版本标签触发发布，避免在 main 上误触发。
  push:
    tags:
      - "v*.*.*"
permissions: write-all
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
concurrency:
  # only allow per workflow per commit (and not pr) to run at a time
  group: "${{ github.workflow }} - ${{ github.head_ref || github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check_tag_version:
    name: Check Release Tag and package.json Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check tag and package.json version
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Current tag: $TAG_REF"
          PKG_VERSION=$(jq -r .version package.json)
          echo "package.json version: $PKG_VERSION"
          if [[ "$TAG_REF" != "v$PKG_VERSION" ]]; then
            echo "Tag ($TAG_REF) does not match package.json version (v$PKG_VERSION)."
            exit 1
          fi
          echo "Tag and package.json version are consistent."

  create_release_notes:
    name: Create Release Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch UPDATE logs
        id: fetch_update_logs
        run: |
          if [ -f "UPDATELOG.md" ]; then
            UPDATE_LOGS=$(awk '/^## v/{if(flag) exit; flag=1} flag' UPDATELOG.md)
            if [ -n "$UPDATE_LOGS" ]; then
              echo "Found update logs"
              echo "UPDATE_LOGS<<EOF" >> $GITHUB_ENV
              echo "$UPDATE_LOGS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            else
              echo "No update sections found in UPDATELOG.md"
            fi
          else
            echo "UPDATELOG.md file not found"
          fi
        shell: bash

      - name: Get Version
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          echo "VERSION=$(cat package.json | jq '.version' | tr -d '"')" >> $GITHUB_ENV
          echo "BUILDTIME=$(TZ=Europe/Moscow date)" >> $GITHUB_ENV

      - name: Publish release (publish draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "OutClash v${{ env.VERSION }}"
          draft: false
          prerelease: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          if [ -z "$UPDATE_LOGS" ]; then
            echo "No update logs found, using default message"
            UPDATE_LOGS="More new features are now supported. Check for detailed changelog soon."
          else
            echo "Using found update logs"
          fi

          cat > release.txt << EOF
          $UPDATE_LOGS

          ## Which version should I download?

          <!--
          ### macOS
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-macos-aarch64.dmg"><img src="https://img.shields.io/badge/DMG-default?style=flat&logo=apple&label=Apple%20Silicon"></a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-macos-x64.dmg"><img src="https://img.shields.io/badge/DMG-default?style=flat&logo=apple&label=Intel"></a><br>
          > :warning: **Warning**
          If you get a notification that the application is corrupted when you run it on macOS, run this command:<br>
          <code>sudo xattr -r -c /Applications/OutClash.app</code>
          -->

          ### Linux
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-x86_64.deb"><img src="https://img.shields.io/badge/x64-default?style=flat&logo=debian&label=DEB"> </a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-x86_64.rpm"><img src="https://img.shields.io/badge/x64-default?style=flat&logo=fedora&label=RPM"> </a>

          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-arm64.deb"><img src="https://img.shields.io/badge/arm64-default?style=flat&logo=debian&label=DEB"> </a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-arm64.rpm"><img src="https://img.shields.io/badge/aarch64-default?style=flat&logo=fedora&label=RPM"> </a>

          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-armhf.deb"><img src="https://img.shields.io/badge/armhf-default?style=flat&logo=debian&label=DEB"> </a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-linux-armhf.rpm"><img src="https://img.shields.io/badge/armhfp-default?style=flat&logo=fedora&label=RPM"> </a>

          ### Windows (Win7 is no longer supported)
          #### Normal version (recommended)
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-windows-x64-setup.exe"><img src="https://badgen.net/badge/icon/x64?icon=windows&label=exe"></a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-windows-arm64-setup.exe"><img src="https://badgen.net/badge/icon/arm64?icon=windows&label=exe"></a>
          #### Portable version is no longer available with many problems
          #### Built-in Webview version 2 (large size, only used in enterprise version of the system or can not install webview2)
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-windows-x64_fixed_webview2-setup.exe"><img src="https://badgen.net/badge/icon/x64?icon=windows&label=exe"></a><br>
          <a href="https://github.com/ckeiituk/clash-verge-rev-lite/releases/download/v${{ env.VERSION }}/OutClash-windows-arm64_fixed_webview2-setup.exe"><img src="https://badgen.net/badge/icon/arm64?icon=windows&label=exe"></a>

          Created at ${{ env.BUILDTIME }}.
          EOF

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{env.VERSION}}
          name: "OutClash v${{env.VERSION}}"
          body_path: release.txt
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release Build
    needs: [check_tag_version, create_release_notes]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # macOS builds disabled (no certificate)
          # - os: macos-latest
          #   target: aarch64-apple-darwin
          # - os: macos-latest
          #   target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            clang \
            lld \
            pkg-config \
            libc6-dev \
            libxslt1.1 \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Get Version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = node -p "require('./package.json').version"
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$v"

      - name: Get Version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: node -e "console.log('VERSION=' + require('./package.json').version)" >> "$GITHUB_ENV"

      - name: Sync version files (Cargo.toml, tauri.conf.json)
        run: pnpm sync-version

      - name: Verify version files
        run: pnpm verify-version

      - name: Tauri build
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-self-contained=no' || '' }}
        with:
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Upload release assets (stable names)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          echo "Uploading artifacts for $TAG (${{ runner.os }} / ${{ matrix.target }})"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            shopt -s nullglob
            BASE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
            for path in "$BASE_DIR"/*; do
              [[ -e "$path" ]] || continue
              fname=$(basename "$path")
              dest=""
              case "$fname" in
                *x64-setup.exe) dest="OutClash-windows-x64-setup.exe" ;;
                *x64-setup.exe.sig) dest="OutClash-windows-x64-setup.exe.sig" ;;
                *x64-setup.nsis.zip) dest="OutClash-windows-x64-setup.nsis.zip" ;;
                *arm64-setup.exe) dest="OutClash-windows-arm64-setup.exe" ;;
                *arm64-setup.exe.sig) dest="OutClash-windows-arm64-setup.exe.sig" ;;
                *arm64-setup.nsis.zip) dest="OutClash-windows-arm64-setup.nsis.zip" ;;
                *) ;;
              esac
              if [[ -n "$dest" ]]; then
                echo "Uploading $fname -> $dest"
                gh release upload "$TAG" "$path#$dest" --clobber
              fi
            done
          else
            shopt -s nullglob
            BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
            for path in "$BASE"/deb/*.deb "$BASE"/rpm/*.rpm "$BASE"/appimage/*.AppImage "$BASE"/AppImage/*.AppImage; do
              [[ -e "$path" ]] || continue
              fname=$(basename "$path")
              dest=""
              case "$fname" in
                *_amd64.deb) dest="OutClash-linux-x86_64.deb" ;;
                *_arm64.deb) dest="OutClash-linux-arm64.deb" ;;
                *_armhf.deb) dest="OutClash-linux-armhf.deb" ;;
                *x86_64.rpm) dest="OutClash-linux-x86_64.rpm" ;;
                *aarch64.rpm) dest="OutClash-linux-arm64.rpm" ;;
                *armhfp.rpm) dest="OutClash-linux-armhf.rpm" ;;
                *.AppImage) dest="OutClash-linux-x86_64.AppImage" ;;
                *) ;;
              esac
              if [[ -n "$dest" ]]; then
                echo "Uploading $fname -> $dest"
                gh release upload "$TAG" "$path#$dest" --clobber
              fi
            done
          fi

  release-for-linux-arm:
    name: Release Build for Linux ARM
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            arch: armhf
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: "Setup for linux"
        run: |-
          sudo ls -lR /etc/apt/

          cat > /tmp/sources.list << EOF
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-backports main multiverse universe restricted

          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main multiverse universe restricted
          EOF

          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list

          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt update

          sudo apt install -y \
            linux-libc-dev:${{ matrix.arch }} \
            libxslt1.1:${{ matrix.arch }} \
            libwebkit2gtk-4.1-dev:${{ matrix.arch }} \
            libayatana-appindicator3-dev:${{ matrix.arch }} \
            libssl-dev:${{ matrix.arch }} \
            patchelf:${{ matrix.arch }} \
            librsvg2-dev:${{ matrix.arch }}

      - name: "Install aarch64 tools"
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: "Install armv7 tools"
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt install -y \
            gcc-arm-linux-gnueabihf \
            g++-arm-linux-gnueabihf

      - name: Build for Linux
        run: |
          pnpm sync-version
          pnpm verify-version
          export PKG_CONFIG_ALLOW_CROSS=1
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf/
          fi
          pnpm build --target ${{ matrix.target }}
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get Version
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          echo "VERSION=$(cat package.json | jq '.version' | tr -d '"')" >> $GITHUB_ENV
          echo "BUILDTIME=$(TZ=Europe/Moscow date)" >> $GITHUB_ENV

      - name: Upload release assets (stable names)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          shopt -s nullglob
          BASE="src-tauri/target/${{ matrix.target }}/release/bundle"
          for path in "$BASE"/deb/*.deb "$BASE"/rpm/*.rpm; do
            [[ -e "$path" ]] || continue
            fname=$(basename "$path")
            dest=""
            case "$fname" in
              *_arm64.deb) dest="OutClash-linux-arm64.deb" ;;
              *_armhf.deb) dest="OutClash-linux-armhf.deb" ;;
              *_amd64.deb) dest="OutClash-linux-x86_64.deb" ;;
              *aarch64.rpm) dest="OutClash-linux-arm64.rpm" ;;
              *armhfp.rpm) dest="OutClash-linux-armhf.rpm" ;;
              *x86_64.rpm) dest="OutClash-linux-x86_64.rpm" ;;
              *) ;;
            esac
            if [[ -n "$dest" ]]; then
              echo "Uploading $fname -> $dest"
              gh release upload "$TAG" "$path#$dest" --clobber
            fi
          done

  release-for-fixed-webview2:
    name: Release Build for Fixed WebView2
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Get Version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = node -p "require('./package.json').version"
          Add-Content -Path $env:GITHUB_ENV -Value "VERSION=$v"

      - name: Get Version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: node -e "console.log('VERSION=' + require('./package.json').version)" >> "$GITHUB_ENV"

      - name: Sync version files (Cargo.toml, tauri.conf.json)
        run: pnpm sync-version

      - name: Verify version files
        run: pnpm verify-version

      - name: Download WebView2 Runtime
        run: |
          invoke-webrequest -uri https://github.com/westinyang/WebView2RuntimeArchive/releases/download/133.0.3065.92/Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -outfile Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab
          Expand .\Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -F:* ./src-tauri
          Remove-Item .\src-tauri\tauri.windows.conf.json
          Rename-Item .\src-tauri\webview2.${{ matrix.arch }}.json tauri.windows.conf.json

      - name: Tauri build
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-C link-self-contained=no' || '' }}
        with:
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Upload release assets (stable names)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          shopt -s nullglob
          BASE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/nsis"
          for path in "$BASE_DIR"/*; do
            [[ -e "$path" ]] || continue
            fname=$(basename "$path")
            dest=""
            case "$fname" in
              *x64-setup.exe) dest="OutClash-windows-x64_fixed_webview2-setup.exe" ;;
              *x64-setup.exe.sig) dest="OutClash-windows-x64_fixed_webview2-setup.exe.sig" ;;
              *x64-setup.nsis.zip) dest="OutClash-windows-x64_fixed_webview2-setup.nsis.zip" ;;
              *arm64-setup.exe) dest="OutClash-windows-arm64_fixed_webview2-setup.exe" ;;
              *arm64-setup.exe.sig) dest="OutClash-windows-arm64_fixed_webview2-setup.exe.sig" ;;
              *arm64-setup.nsis.zip) dest="OutClash-windows-arm64_fixed_webview2-setup.nsis.zip" ;;
              *) ;;
            esac
            if [[ -n "$dest" ]]; then
              echo "Uploading $fname -> $dest"
              gh release upload "$TAG" "$path#$dest" --clobber
            fi
          done

      - name: Portable Bundle
        run: pnpm portable-fixed-webview2 ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-update:
    name: Release Update
    runs-on: ubuntu-latest
    needs: [release, release-for-linux-arm]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install
        run: pnpm i

      - name: Release updater file
        run: pnpm updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-update-for-fixed-webview2:
    runs-on: ubuntu-latest
    needs: [release-for-fixed-webview2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install
        run: pnpm i

      - name: Release updater file
        run: pnpm updater-fixed-webview2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-notify-to-telegram:
    runs-on: ubuntu-latest
    needs: [release-update, release-update-for-fixed-webview2]
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_TO_CHANNEL: ${{ secrets.TELEGRAM_TO_CHANNEL }}
      TELEGRAM_TO_GROUP: ${{ secrets.TELEGRAM_TO_GROUP }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch UPDATE logs
        id: fetch_update_logs
        run: |
          if [ -f "UPDATELOG.md" ]; then
            UPDATE_LOGS=$(awk '/^## v/{if(flag) exit; flag=1} flag' UPDATELOG.md)
            if [ -n "$UPDATE_LOGS" ]; then
              echo "Found update logs"
              echo "UPDATE_LOGS<<EOF" >> $GITHUB_ENV
              echo "$UPDATE_LOGS" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
            else
              echo "No update sections found in UPDATELOG.md"
            fi
          else
            echo "UPDATELOG.md file not found"
          fi
        shell: bash

      - name: Get Version
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          echo "VERSION=$(cat package.json | jq '.version' | tr -d '"')" >> $GITHUB_ENV
          echo "BUILDTIME=$(TZ=Europe/Moscow date)" >> $GITHUB_ENV

      - run: |
          if [ -z "$UPDATE_LOGS" ]; then
            echo "No update logs found, using default message"
            UPDATE_LOGS="More new features are now supported. Check for detailed changelog soon."
          else
            echo "Using found update logs"
            UPDATE_LOGS=$(echo "$UPDATE_LOGS" | sed 's/^## \(v.*\)/\*\1\*/')
          fi

          cat > release.txt << EOF
          Вышло обновление!

          $UPDATE_LOGS

          [Ссылка на релиз](https://github.com/ckeiituk/clash-verge-rev-lite/releases/latest)

          EOF

      - name: notify to channel
        if: ${{ env.TELEGRAM_TOKEN != '' && env.TELEGRAM_TO_CHANNEL != '' }}
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO_CHANNEL }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message_file: release.txt
          format: markdown

      - name: notify to group
        if: ${{ env.TELEGRAM_TOKEN != '' && env.TELEGRAM_TO_GROUP != '' }}
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO_GROUP }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message_file: release.txt
          format: markdown
